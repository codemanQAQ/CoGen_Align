project:
  name: cogen-align
  seed: 42

data:
  audio_root: /data/speech/tts/intern/mqb/wavs/LibriSpeech
  feature_root: /data/speech/tts/intern/mqb/personal/cogen-align/data/features
  sample_rate: 16000
  max_duration: 30.0
  min_duration: 1.0
  whisper_model: /mnt/tos/tts/intern/liudaxing/pretrain/whisper-large-v3

model:
  llm_name: /data/speech/tts/intern/mqb/models/Qwen2.5-7B-Instruct
  llm_hidden_size: 3584
  whisper_feature_dim: 1280
  projector:
    type: mlp
    hidden_dim: 4096
    output_dim: 3584
    subsample: 5
    use_attention_pooling: true

training:
  bf16: true
  gradient_clip: 1.0
  log_every: 50
  save_every: 5000
  eval_every: 2000

# Weights & Biases：不设环境变量 WANDB_DISABLED 时，训练标量自动出折线图（Charts）。
# Linux 服务器：先 `pip install wandb`（见 pyproject [train]），再 `wandb login`。
wandb:
  project: cogen-align
  entity: null
  notes: null
