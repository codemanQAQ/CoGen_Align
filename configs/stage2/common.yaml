# Stage2 公共字段；须与 doc/CoGen_Align_实验设计终稿.md 三、四、七节及 Stage1 清单路径一致。
# baseline_* / cogen_* 仅覆盖 run_name、output_dir、data.train_manifest、condition、warmup_init_path。
inherit: configs/base.yaml

condition: baseline
data_size: null

data:
  # 七节：与 Stage1 相同配对 manifest（train_*h.jsonl）；验证用 dev-clean
  val_manifest: data/manifests/train/dev_clean.jsonl

training:
  # CoGen：Stage1 结束权重，固定文件名见 train_stage1.py 末尾 ckpt_last.pt
  warmup_init_path: null
  batch_size_per_gpu: 4
  gradient_accumulation: 4
  lr_projector: 5.0e-5
  lr_lora: 1.0e-4
  lora_rank: 64
  lora_alpha: 128
  gradient_clip: 1.0
  max_steps: 5000
  eval_every: 500
  save_every: 1000
  log_every: 50
